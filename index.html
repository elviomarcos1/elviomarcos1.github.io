<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="assets/img/logo.webp" />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="/css/components/navbar.css" />
    <link rel="stylesheet" href="css/components/text-components/action.css" />
    <link rel="stylesheet" href="/css/components/button.css" />
    <link rel="stylesheet" href="css/components/home-banner/banner.css">
    <link rel="stylesheet" href="/css/components/home-banner/box.css" />
    <link rel="stylesheet" href="css/components/text-components/title.css"/>
    <link rel="stylesheet" href="/css/components/text-components/subtitle.css">
    <link rel="stylesheet" href="css/components/text-components/main-title.css" />
    <link rel="stylesheet" href="css/components/skills/skills-banner.css" />
    <link rel="stylesheet" href="css/components/skills/skills-box.css" />
    <link rel="stylesheet" href="css/components/skills/icon.css" />
    <link rel="stylesheet" href="css/components/skills/skills-icon.css" />
    <link rel="stylesheet" href="css/components/skills/bar.css" />
    <link rel="stylesheet" href="css/components/section.css">

    <title>Elvio Marcos</title>
  </head>

  <body>
    <header class="navbar">
      <img class="logo" src="assets/img/logo.webp" alt="Logo" />

      <nav>
        <a class="action" href="#Skills">Skills</a>
        <a class="action" href="#Projetos">Projetos</a>
        <a class="action" href="">Sobre</a>
        <a class="action" href="">Contatos</a>
        <a class="button" href="assets/Elvio Marcos Faria Junior.pdf" download>Donwload CV</a>
      </nav>
    </header>

    <section class="banner">
      <div class="wrapper">
        <div class="box">
          <h1 class="title">Elvio Marcos</h1>
          <h2 class="subtitle">Desenvolvedor Full Stack</h2>
        </div>

        <div class="navigation">
          <a class="button" href="assets/Elvio Marcos Faria Junior.pdf" download>Donwload CV</a>
          <a class="button" href="">Contatos</a>
        </div>
      </div>
    </section>

    <section class="section -skills-banner">
      <a name="Skills"></a>
      <h2 class="title main-title">Skills</h2>

      <div class="skills-box">
        <div class="skills-icon">
          <img class="icon" src="assets/img/icons/ico_html5.png" alt="Html" />
          <div>
            <p>HTML</p>
            <div class="html bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img class="icon" src="assets/img/icons/ico_css3.png" alt="Css" />
          <div>
            <p>CSS</p>
            <div class="css bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img
            class="icon"
            src="assets/img/icons/ico_js.png"
            alt="JavaScript"
          />
          <div>
            <p>JavaScript</p>
            <div class="javascript bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img
            class="icon"
            src="assets/img/icons/ico_nodejs.png"
            alt="NodeJS"
          />
          <div>
            <p>NodeJS</p>
            <div class="nodejs bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img class="icon" src="assets/img/icons/ico_react.png" alt="React" />
          <div>
            <p>React</p>
            <div class="react bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img class="icon" src="assets/img/icons/ico_git.png" alt="Git" />
          <div>
            <p>Git</p>
            <div class="git bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section -projetos-banner">
      <a name="Projetos"></a>
      <h2 class="title main-title">Projetos</h2>

    </section>
  </body>
</html>
