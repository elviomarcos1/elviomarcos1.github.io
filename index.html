<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="assets/img/logo.webp" />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/components/main-navbar.css" />
    <link rel="stylesheet" href="css/components/text-components/main-action.css" />
    <link rel="stylesheet" href="css/components/main-button.css" />
    <link rel="stylesheet" href="css/components/home-banner/home-banner.css">
    <link rel="stylesheet" href="css/components/home-banner/home-box.css" />
    <link rel="stylesheet" href="css/components/text-components/title.css"/>
    <link rel="stylesheet" href="css/components/text-components/subtitle.css">
    <link rel="stylesheet" href="css/components/text-components/main-title.css" />
    <link rel="stylesheet" href="css/components/skills/skills-banner.css" />
    <link rel="stylesheet" href="css/components/skills/skills-box.css" />
    <link rel="stylesheet" href="css/components/skills/skills-img.css" />
    <link rel="stylesheet" href="css/components/skills/skills-icon.css" />
    <link rel="stylesheet" href="css/components/skills/skills-bar.css" />
    <link rel="stylesheet" href="css/components/section.css">
    <link rel="stylesheet" href="css/components/project/project-banner.css">
    <link rel="stylesheet" href="css/components/project/project-image.css">
    <link rel="stylesheet" href="css/components/project/project-box.css">

    <title>Elvio Marcos</title>
  </head>

  <body>
    <header class="main-navbar">
      <img class="logo" src="assets/img/logo.webp" alt="Logo" />

      <nav>
        <a class="main-action" href="#Skills">Skills</a>
        <a class="main-action" href="#Projetos">Projetos</a>
        <a class="main-action" href="">Sobre</a>
        <a class="main-action" href="">Contatos</a>
        <a class="main-button" href="assets/Curriculum en.pdf" download>Donwload CV</a>
      </nav>
    </header>

    <section class="home-banner">
      <div class="wrapper">
        <div class="home-box">
          <h1 class="title">Elvio Marcos</h1>
          <h2 class="subtitle">Desenvolvedor Full Stack</h2>
        </div>

        <div class="navigation">
          <a class="main-button" href="assets/Curriculum en.pdf" download>Donwload CV</a>
          <a class="main-button" href="">Contatos</a>
        </div>
      </div>
    </section>

    <section class="section -skills-banner">
      <a name="Skills"></a>
      <h2 class="title main-title">Skills</h2>

      <div class="skills-box">
        <div class="skills-icon">
          <img class="skills-img" src="assets/img/icons/ico_html5.png" alt="Html" />
          <div>
            <p>HTML</p>
            <div class="html skills-bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img class="skills-img" src="assets/img/icons/ico_css3.png" alt="Css" />
          <div>
            <p>CSS</p>
            <div class="css skills-bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img
            class="skills-img"
            src="assets/img/icons/ico_js.png"
            alt="JavaScript"
          />
          <div>
            <p>JavaScript</p>
            <div class="javascript skills-bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img
            class="skills-img"
            src="assets/img/icons/ico_nodejs.png"
            alt="NodeJS"
          />
          <div>
            <p>NodeJS</p>
            <div class="nodejs skills-bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img class="skills-img" src="assets/img/icons/ico_react.png" alt="React" />
          <div>
            <p>React</p>
            <div class="react skills-bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
        <div class="skills-icon">
          <img class="skills-img" src="assets/img/icons/ico_git.png" alt="Git" />
          <div>
            <p>Git</p>
            <div class="git skills-bar">
              <div class="progress"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section -project-banner">
      <a name="Projetos"></a>
      <h2 class="title main-title">Projetos</h2>

      <div class="project-box">
        <a href="https://github.com/elviomarcos1/Locadora_FilmAndGame_ASPNET" target="_blank">
          <figure>
            <img class="project-image" src="/assets/img/project-img/project-img1.gif" alt="Project - ASPNET" title="Em breve">
          </figure>
        </a>
        <a href="https://github.com/elviomarcos1/Jornada_Do_Gari" target="_blank">
          <figure>
            <img class="project-image" src="assets/img/project-img/project-img2.gif" alt="Project - Jornada do Gari" title="Em breve">
          </figure>
        </a>
        <a href="https://github.com/elviomarcos1/Algoritmos_de_Ordenacao" target="_blank">
          <figure>
            <img class="project-image" src="assets/img/project-img/project-img3.gif" alt="Project - Algoritmo de Ordenação" title="Em breve">
          </figure>
        </a>
      </div>
    </section>

  </body>
</html>
